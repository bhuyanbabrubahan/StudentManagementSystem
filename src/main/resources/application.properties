spring.application.name=StudentManagementSystem

server.port=8089

# ===========================
# MySQL Database
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/student_management_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=itsbablutime
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# Hibernate Batch
# ===========================
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ===========================
# Logging
# ===========================
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.com.example.student=INFO


# ==============================
# Swagger / OpenAPI Configuration
# ==============================

springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.operationsSorter=method

springdoc.swagger-ui.tagsSorter=alpha


spring.jackson.deserialization.fail-on-unknown-properties=true


# ==========================================
# EMAIL CONFIGURATION
# ==========================================

spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.protocol=smtp

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.trust=sandbox.smtp.mailtrap.io
spring.mail.properties.mail.debug=true

# ==========================================
# APPLICATION MAIL CONFIGURATION
# ==========================================

app.mail.from=${MAIL_FROM}
app.mail.reset-password-url=http://localhost:4200/reset-password?token=



jwt.secret=mysecretkeymysecretkeymysecretkey12345
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000


